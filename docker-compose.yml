version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: polymarket-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  bot:
    build: .
    container_name: polymarket-python
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    tty: true
    stdin_open: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: python main.py

  dashboard:
    build: .
    container_name: polymarket-dashboard
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: python dashboard.py
